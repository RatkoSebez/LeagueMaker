<div class="row justify-content-center">
    <div class="col-auto">
        <table class="table table-secondary table-striped w-auto mt-3">
            <thead>
                <tr>
                    <th scope="col">#</th>
                    <th scope="col">Name</th>
                    <th scope="col">P</th>
                    <th scope="col">W</th>
                    <th scope="col">D</th>
                    <th scope="col">L</th>
                    <th scope="col">Pts</th>
                    <th scope="col"></th>
                </tr>
            </thead>
            <tbody>
                <tr *ngFor="let competitorStandings of standings; let i = index">
                    <th scope="row">{{ i + 1 }}</th>
                    <td>{{ competitorStandings.competitorName }}</td>
                    <td>{{ competitorStandings.gamesPlayed }}</td>
                    <td>{{ competitorStandings.gamesWon }}</td>
                    <td>{{ competitorStandings.gamesDraw }}</td>
                    <td>{{ competitorStandings.gamesLost }}</td>
                    <td>{{ competitorStandings.points }}</td>
                    <td><button class="btn btn-primary btn-sm" type="button" data-bs-toggle="modal" data-bs-target="#editCompetitor"
                        *ngIf="isAdminOfCompetition === true" (click)="setCurrentCompetitorData(competitorStandings)"><svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" class="bi bi-pencil-square"
                            viewBox="0 0 16 16">
                            <path
                                d="M15.502 1.94a.5.5 0 0 1 0 .706L14.459 3.69l-2-2L13.502.646a.5.5 0 0 1 .707 0l1.293 1.293zm-1.75 2.456-2-2L4.939 9.21a.5.5 0 0 0-.121.196l-.805 2.414a.25.25 0 0 0 .316.316l2.414-.805a.5.5 0 0 0 .196-.12l6.813-6.814z" />
                            <path fill-rule="evenodd"
                                d="M1 13.5A1.5 1.5 0 0 0 2.5 15h11a1.5 1.5 0 0 0 1.5-1.5v-6a.5.5 0 0 0-1 0v6a.5.5 0 0 1-.5.5h-11a.5.5 0 0 1-.5-.5v-11a.5.5 0 0 1 .5-.5H9a.5.5 0 0 0 0-1H2.5A1.5 1.5 0 0 0 1 2.5v11z" />
                        </svg></button></td>
                </tr>
            </tbody>
        </table>
    </div>
</div>


<!-- Edit competitor modal -->
<div class="modal fade" id="editCompetitor" tabindex="-1" aria-labelledby="exampleModalLabel" aria-hidden="true">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="exampleModalLabel">Edit competitor</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body">
                <label for="">Competitor name</label>
                <input class="form-control mb-4" type="text" placeholder="" name="owner id" [(ngModel)]="competitorName">
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
                <button type="submit" class="btn btn-primary" data-bs-dismiss="modal"
                    (click)="editCompetitorName()">Submit</button>
            </div>
        </div>
    </div>
</div>
