<div class="container">
    <div class="row">
        <div class="col-md-6 offset-md-3">
            <div class="signup-form">
                <form action="" class="mt-5 border p-4 bg-light shadow" [formGroup]="loginForm" (ngSubmit)="login()">
                    <h4 class="mb-5 text-secondary">Login</h4>
                    <div class="row">
                        <div class="mb-3 col-md-12">
                            <label>Username</label>
                            <input type="text" name="username" class="form-control" placeholder="Username"
                                formControlName="username" autofocus>
                            <span class="text-danger" *ngIf="username && username.invalid && username.touched">Username can not be empty</span>
                        </div>

                        <div class="mb-3 col-md-12">
                            <label>Password</label>
                            <input type="password" name="password" class="form-control" placeholder="Enter Password"
                                formControlName="password">
                            <span class="text-danger" *ngIf="password && password.invalid && password.touched">Password can not be empty</span>
                        </div>
                        
                        <span class="text-danger">{{ errorMessage }}</span>

                        <div class="col-md-12">
                            <button class="btn btn-primary float-end" [disabled]="loginForm.invalid">Login</button>
                        </div>
                    </div>
                </form>
                <p class="text-center mt-3 text-secondary">If you do not have account, please <a routerLink="/register">Register Now</a>
                </p>
            </div>
        </div>
    </div>
</div>
